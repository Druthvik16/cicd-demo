name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # JOB 1 — Figure out what changed
  detect-changes:
    name: Detect What Changed
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.check.outputs.frontend }}
      backend_changed: ${{ steps.check.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Files changed: $CHANGED"

          if echo "$CHANGED" | grep -q "^angular-frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^node-backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

  # JOB 2 — Build Angular (ONLY if angular-frontend/ files changed)
  build-frontend:
    name: Build Angular
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (only if package.json changed)
        working-directory: angular-frontend
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -q "angular-frontend/package.json"; then
            echo "package.json changed — running npm install"
            npm install
          else
            echo "package.json unchanged — running npm ci from lock file"
            npm ci
          fi

      - name: Build Angular
        working-directory: angular-frontend
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: angular-frontend/dist/angular-frontend/browser/
          retention-days: 1

  # JOB 3 — Deploy to EC2
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [detect-changes, build-frontend]
    if: |
      always() &&
      (needs.detect-changes.outputs.frontend_changed == 'true' || needs.detect-changes.outputs.backend_changed == 'true') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Download Angular build
        if: needs.detect-changes.outputs.frontend_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: angular-build-output/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Angular build to EC2
        if: needs.detect-changes.outputs.frontend_changed == 'true'
        run: |
          ssh -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "rm -rf ~/app/node-backend/public/* && mkdir -p ~/app/node-backend/public"
          scp -i ~/.ssh/key.pem -r angular-build-output/* \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/node-backend/public/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/app
            git pull origin main

            # npm install backend ONLY if package.json changed
            CHANGED=$(git diff HEAD~1 HEAD --name-only)
            if echo "$CHANGED" | grep -q "node-backend/package.json"; then
              echo "Backend package.json changed — running npm install"
              cd node-backend && npm install --production && cd ..
            else
              echo "Backend package.json unchanged — skipping npm install"
            fi

            # Restart or start PM2
            cd node-backend
            if pm2 list | grep -q "cicd-demo"; then
              pm2 restart cicd-demo
            else
              pm2 start server.js --name cicd-demo
              pm2 save
            fi

            echo "Deploy done! App restarted with new code."
          ENDSSH

      - name: Health check
        run: |
          sleep 8
          curl --fail --silent http://${{ secrets.EC2_HOST }}:3000/api/health \
            | grep '"success":true' && echo "App is healthy!" || echo "Check PM2 logs"