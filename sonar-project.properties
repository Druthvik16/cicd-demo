sonar.projectKey=YOUR_PROJECT_KEY
sonar.organization=Druthvik16
sonar.projectName=CI/CD Demo
sonar.projectVersion=1.0

# Source folders to scan
sonar.sources=node-backend,angular-frontend/src

# Exclude folders we don't want scanned
# sonar.exclusions=**/node_modules/**,**/dist/**,**/public/**,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/public/**,**/*.spec.ts,**/*.test.ts,**/environments/**

# Language settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
