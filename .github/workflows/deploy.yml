######### BOTH-FRONTEND-BACKEND #########

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # JOB 1 — Detect what changed
  detect-changes:
    name: Detect What Changed
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.check.outputs.frontend }}
      backend_changed: ${{ steps.check.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files
        id: check
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff-tree --no-commit-id -r --name-only HEAD)
          fi

          echo "Files changed:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "^angular-frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^node-backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

  # JOB 2 — Build Angular (runs whenever frontend changed, regardless of backend)
  build-frontend:
    name: Build Angular
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: angular-frontend
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff-tree --no-commit-id -r --name-only HEAD)
          fi
          if echo "$CHANGED" | grep -q "angular-frontend/package.json"; then
            echo "package.json changed - npm install"
            npm install
          else
            echo "package.json unchanged - npm ci"
            npm ci
          fi

      - name: Build Angular
        working-directory: angular-frontend
        run: npm run build -- --configuration development

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: angular-frontend/dist/angular-frontend/browser/
          retention-days: 1

  # JOB 3 — Frontend ONLY (frontend changed, backend did NOT change)
  deploy-frontend-only:
    name: Deploy Frontend Only
    runs-on: ubuntu-latest
    needs: [detect-changes, build-frontend]
    if: |
      needs.detect-changes.outputs.frontend_changed == 'true' &&
      needs.detect-changes.outputs.backend_changed == 'false' &&
      needs.build-frontend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download Angular build
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: angular-build-output/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -t rsa,ed25519 $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy Angular build to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST \
            "rm -rf ~/app/node-backend/public/* && mkdir -p ~/app/node-backend/public"
          scp -i ~/.ssh/key.pem -o StrictHostKeyChecking=no -r angular-build-output/* \
            $EC2_USER@$EC2_HOST:~/app/node-backend/public/
          echo "Angular build copied!"

      - name: Restart PM2 (serve new frontend)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e
            cd ~/app/node-backend
            if pm2 list | grep -q "cicd-demo"; then
              pm2 restart cicd-demo
            else
              pm2 start server.js --name cicd-demo
              pm2 save
            fi
            echo "=== Frontend-only deploy done ==="
          ENDSSH

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 8
          curl --fail --silent http://$EC2_HOST:3000/api/health \
            | grep '"success":true' && echo "App healthy!" || echo "Check PM2 logs"

  # JOB 4 — Backend ONLY (backend changed, frontend did NOT change)
  deploy-backend-only:
    name: Deploy Backend Only
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend_changed == 'true' &&
      needs.detect-changes.outputs.frontend_changed == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -t rsa,ed25519 $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy backend on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e
            echo "=== Backend-only deploy ==="
            cd ~/app
            git pull origin main

            if git rev-parse HEAD~1 > /dev/null 2>&1; then
              CHANGED=$(git diff HEAD~1 HEAD --name-only)
            else
              CHANGED=$(git diff-tree --no-commit-id -r --name-only HEAD)
            fi

            if echo "$CHANGED" | grep -q "node-backend/package.json"; then
              echo "package.json changed - running npm install"
              cd node-backend && npm install --production && cd ..
            else
              echo "package.json unchanged - skipping npm install"
            fi

            cd node-backend
            if pm2 list | grep -q "cicd-demo"; then
              pm2 restart cicd-demo
            else
              pm2 start server.js --name cicd-demo
              pm2 save
            fi
            echo "=== Backend deploy done ==="
          ENDSSH

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 8
          curl --fail --silent http://$EC2_HOST:3000/api/health \
            | grep '"success":true' && echo "Backend healthy!" || echo "Check PM2 logs"

  # JOB 5 — BOTH changed (frontend AND backend changed)
  deploy-both:
    name: Deploy Frontend + Backend
    runs-on: ubuntu-latest
    needs: [detect-changes, build-frontend]
    if: |
      needs.detect-changes.outputs.frontend_changed == 'true' &&
      needs.detect-changes.outputs.backend_changed == 'true' &&
      needs.build-frontend.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Download Angular build
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: angular-build-output/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -t rsa,ed25519 $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy Angular build to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST \
            "rm -rf ~/app/node-backend/public/* && mkdir -p ~/app/node-backend/public"
          scp -i ~/.ssh/key.pem -o StrictHostKeyChecking=no -r angular-build-output/* \
            $EC2_USER@$EC2_HOST:~/app/node-backend/public/
          echo "Angular build copied!"

      - name: Deploy backend on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e
            echo "=== Full deploy (frontend + backend) ==="
            cd ~/app
            git pull origin main

            if git rev-parse HEAD~1 > /dev/null 2>&1; then
              CHANGED=$(git diff HEAD~1 HEAD --name-only)
            else
              CHANGED=$(git diff-tree --no-commit-id -r --name-only HEAD)
            fi

            if echo "$CHANGED" | grep -q "node-backend/package.json"; then
              echo "package.json changed - running npm install"
              cd node-backend && npm install --production && cd ..
            else
              echo "package.json unchanged - skipping npm install"
            fi

            cd node-backend
            if pm2 list | grep -q "cicd-demo"; then
              pm2 restart cicd-demo
            else
              pm2 start server.js --name cicd-demo
              pm2 save
            fi
            echo "=== Full deploy done ==="
          ENDSSH

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 8
          curl --fail --silent http://$EC2_HOST:3000/api/health \
            | grep '"success":true' && echo "App healthy!" || echo "Check PM2 logs"